<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transactions</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <!-- 🔹 Navbar -->
    <nav class="navbar navbar-dark bg-dark px-3">
      <span class="navbar-brand">Finance Tracker</span>
      <div>
        <a href="/" class="btn btn-light btn-sm me-2">Dashboard</a>
        <a href="/transactions/add/" class="btn btn-success btn-sm">Add</a>
      </div>
    </nav>

    <!-- 🔹 Container -->
    <div class="container mt-4">
      <h3 class="mb-3">Your Transactions</h3>

      <table class="table table-bordered table-striped">
        <thead class="table-dark">
          <tr>
            <th>Amount</th>
            <th>Type</th>
            <th>Category</th>
            <th>Date</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          {% for t in transactions %}
          <tr>
            <td>₹{{ t.amount }}</td>
            <td>
              {% if t.type == 'income' %}
              <span class="badge bg-success">Income</span>
              {% else %}
              <span class="badge bg-danger">Expense</span>
              {% endif %}
            </td>
            <td>{{ t.category }}</td>
            <td>{{ t.date }}</td>
            <td>{{ t.description }}</td>
            <td>
              <a
                href="/transactions/edit/{{ t.id }}/"
                class="btn btn-warning btn-sm"
                >Edit</a
              >
              <a
                href="/transactions/delete/{{ t.id }}/"
                class="btn btn-danger btn-sm"
                onclick="return confirm('Are you sure?');"
                >Delete</a
              >
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </body>
</html>
